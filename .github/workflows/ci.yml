name: MindFlow CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Mental Health Trend Analytics Platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Mental Health Trend Analytics Platform/package-lock.json
            Mental Health Trend Analytics Platform/client/package-lock.json
            Mental Health Trend Analytics Platform/server/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install --workspace=client

      - name: Install server dependencies
        run: npm install --workspace=server

      - name: Run backend tests
        run: npm run test

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
